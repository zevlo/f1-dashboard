name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'lambdas/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Same OIDC role that v1 used; trust policy widened in Phase 1.5 to
# repo:zevlo/f1-*:* so it covers this new repo alongside the old one.
jobs:
  infra:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::746669194590:role/github-oidc-f1-telemetry
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"
          # No wrapper: `terraform output -raw` must emit only the value on
          # stdout, or command substitution captures ::error:: noise.
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -input=false -lock=false

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

  # Sequenced after infra so the Terraform outputs this job reads (bucket,
  # distribution, API URLs) always reflect the just-applied state.
  frontend:
    runs-on: ubuntu-latest
    needs: infra
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::746669194590:role/github-oidc-f1-telemetry
          aws-region: us-east-1

      - name: Setup Terraform (for outputs)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform/environments/dev
        run: |
          set -euo pipefail
          terraform init -input=false
          api_base_url=$(terraform output -raw api_base_url)
          websocket_url=$(terraform output -raw websocket_url)
          bucket_name=$(terraform output -raw frontend_bucket_name)
          distribution_id=$(terraform output -raw cloudfront_distribution_id)
          echo "api_base_url=$api_base_url" >> "$GITHUB_OUTPUT"
          echo "websocket_url=$websocket_url" >> "$GITHUB_OUTPUT"
          echo "bucket_name=$bucket_name" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Env vars are explicitly injected here so CI is the source of truth
      # (frontend/.env.production is a dev convenience only). If the two
      # drift, CI wins.
      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.tf.outputs.api_base_url }}
          VITE_WS_URL: ${{ steps.tf.outputs.websocket_url }}
        run: |
          npm ci
          npm run build

      # Immutable cache on hashed assets (one-year max-age); index.html must
      # always be revalidated so deploys are visible immediately.
      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${{ steps.tf.outputs.bucket_name }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 cp frontend/dist/index.html "s3://${{ steps.tf.outputs.bucket_name }}/index.html" \
            --cache-control "public,max-age=0,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"
